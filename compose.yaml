services:
  app:
    build:
      context: .
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      SERVER_NAME: ":80"
      APP_ENV: dev
      # Overrides the .env DATABASE_URL (generated by Flex) to target the db service.
      DATABASE_URL: "mysql://app:app@db:3306/shop_network?serverVersion=8.4.0&charset=utf8mb4"
    volumes:
      # Mount the source code in dev (hot reload).
      - .:/app
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: shop_network
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro

volumes:
  db_data:
