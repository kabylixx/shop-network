# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/Kernel.php'
            - '../src/*/Domain/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    # Write
    App\Catalog\Domain\ProductRepository: '@App\Catalog\Infrastructure\Persistence\Doctrine\DoctrineProductRepository'
    App\Network\Domain\ManagerRepository: '@App\Network\Infrastructure\Persistence\Doctrine\DoctrineManagerRepository'
    App\Network\Domain\ShopRepository: '@App\Network\Infrastructure\Persistence\Doctrine\DoctrineShopRepository'
    App\Inventory\Domain\StockRepository: '@App\Inventory\Infrastructure\Persistence\Doctrine\DoctrineStockRepository'

    # Inventory cross-module existence ports
    App\Inventory\Application\ProductExistence: '@App\Inventory\Infrastructure\Persistence\Doctrine\DbalProductExistence'
    App\Inventory\Application\ShopExistence: '@App\Inventory\Infrastructure\Persistence\Doctrine\DbalShopExistence'

    # Read
    App\Catalog\Application\ProductCatalog: '@App\Catalog\Infrastructure\Persistence\Doctrine\DoctrineProductCatalog'
    App\Network\Application\ShopFinder: '@App\Network\Infrastructure\Persistence\Doctrine\DoctrineShopFinder'
    App\Inventory\Application\StockFinder: '@App\Inventory\Infrastructure\Persistence\Doctrine\DoctrineStockFinder'
